name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-and-test:
    name: Release gate (lint + Linux test)
    runs-on: ubuntu-latest
    steps:
      - name: Disable CRLF conversion
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Linux system libs (for node-hid)
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev
      - name: Install deps
        run: npm ci
      - name: Build DAPjs
        run: npm run build:dapjs
      - name: ESLint
        run: npm run lint
      - name: TypeScript typecheck
        run: npx tsc --noEmit -p .
      - name: Validate target JSON files
        run: npm run lint:targets
      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - name: Webpack build
        run: npm run compile
      - name: Run extension tests
        run: xvfb-run -a npm test

  build:
    name: Build VSIX (${{ matrix.target }})
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-15
            target: darwin-x64
          - os: windows-latest
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: ubuntu-latest
            target: linux-armhf
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Disable CRLF conversion
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Set up QEMU (cross-build)
        if: matrix.cross
        uses: docker/setup-qemu-action@v3
      - name: Install Linux system libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev
      - name: Install deps
        run: npm ci
      - name: Build DAPjs
        run: npm run build:dapjs
      - name: Verify node-hid native binding
        if: '!matrix.cross'
        shell: bash
        run: |
          node -e "const h=require('node-hid'); console.log('node-hid loaded, HID devices count=', h.devices().length)"
      - name: Webpack build
        run: npm run compile
      - name: Package VSIX (${{ matrix.target }})
        run: npx --yes @vscode/vsce@3 package --target ${{ matrix.target }} --out freeocd-extension-${{ matrix.target }}.vsix
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: freeocd-extension-${{ matrix.target }}.vsix

  publish:
    name: Publish (Marketplace + Open VSX + GitHub Releases)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install publishers
        run: npm install -g @vscode/vsce@3 ovsx@0
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: vsix
          pattern: vsix-*
          merge-multiple: true
      - name: List VSIX files
        run: ls -la vsix
      - name: Publish to VS Code Marketplace
        id: marketplace
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.AZURE_PAT }}
        run: |
          for file in vsix/*.vsix; do
            echo "Publishing $file to Marketplace..."
            vsce publish --packagePath "$file" || echo "Marketplace publish failed for $file"
          done
      - name: Publish to Open VSX
        id: openvsx
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PAT }}
        run: |
          for file in vsix/*.vsix; do
            echo "Publishing $file to Open VSX..."
            ovsx publish "$file" || echo "Open VSX publish failed for $file"
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: vsix/*.vsix
      - name: Publish summary
        run: |
          {
            echo "# FreeOCD Release Summary";
            echo "";
            echo "| Channel | Result |";
            echo "|---------|--------|";
            echo "| VS Code Marketplace | ${{ steps.marketplace.outcome }} |";
            echo "| Open VSX | ${{ steps.openvsx.outcome }} |";
            echo "| GitHub Release | success |";
            echo "";
            echo "## Artifacts";
            ls -la vsix | awk 'NR>1 {print "- " $9}';
          } >> "$GITHUB_STEP_SUMMARY"
