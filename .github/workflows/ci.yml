name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + typecheck + target JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript typecheck
        run: npx tsc --noEmit -p .
      - name: Validate target JSON files
        run: npm run lint:targets

  build-and-test:
    name: Build & test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install Linux system libs (for node-hid)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev
      - name: Install deps
        run: npm ci
      - name: Build DAPjs (vendor/dapjs)
        run: |
          cd vendor/dapjs
          npm install --no-save
          npm run build
      - name: Verify node-hid native binding
        shell: bash
        run: |
          node -e "const h=require('node-hid'); console.log('node-hid loaded, HID devices count=', h.devices().length)"
      - name: Webpack build (production)
        run: npm run compile
      - name: Run extension tests
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
      - name: Run extension tests (non-Linux)
        if: runner.os != 'Linux'
        run: npm test
