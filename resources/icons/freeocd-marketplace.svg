<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="0" y="0" width="256" height="256" rx="40" fill="url(#bg)"/>

  <g stroke="#e2e8f0" stroke-width="7" stroke-linecap="round" fill="none">
    <!-- Chip body -->
    <rect x="72" y="72" width="112" height="112" rx="10" fill="#0b1220"/>

    <!-- Pins -->
    <line x1="40"  y1="96"  x2="72"  y2="96"/>
    <line x1="40"  y1="128" x2="72"  y2="128"/>
    <line x1="40"  y1="160" x2="72"  y2="160"/>
    <line x1="184" y1="96"  x2="216" y2="96"/>
    <line x1="184" y1="128" x2="216" y2="128"/>
    <line x1="184" y1="160" x2="216" y2="160"/>
    <line x1="96"  y1="40"  x2="96"  y2="72"/>
    <line x1="128" y1="40"  x2="128" y2="72"/>
    <line x1="160" y1="40"  x2="160" y2="72"/>
    <line x1="96"  y1="184" x2="96"  y2="216"/>
    <line x1="128" y1="184" x2="128" y2="216"/>
    <line x1="160" y1="184" x2="160" y2="216"/>
  </g>

  <!-- Lightning bolt (flash) -->
  <path d="M142 92 L102 148 L126 148 L114 176 L156 118 L132 118 Z"
        fill="url(#bolt)" stroke="#b45309" stroke-width="3" stroke-linejoin="round"/>
</svg>
